<div class="modal-overlay" id="adoptModal" role="dialog" aria-modal="true" aria-labelledby="adoptTitle"><div class="modal"><div class="modal__header"><h2 class="modal__title" id="adoptTitle">ยื่นคำขอรับเลี้ยง</h2><button class="modal__close" onclick="closeAdopt()" aria-label="ปิด">✕</button></div><div class="modal__body"><div id="adoptAlert" class="alert" role="alert" aria-live="polite"></div><p class="text-muted text-small mb-6">สุนัข: <strong id="adoptDogName"></strong></p><form id="adoptForm" novalidate><input type="hidden" id="adoptDogId"><div class="form-row"><div class="form-group"><label class="form-label form-label--required" for="adoptName">ชื่อ-นามสกุล</label><input class="form-control" type="text" id="adoptName" required></div><div class="form-group"><label class="form-label form-label--required" for="adoptPhone">เบอร์โทร</label><input class="form-control" type="tel" id="adoptPhone" required></div></div><div class="form-group"><label class="form-label form-label--required" for="adoptEmail">อีเมล</label><input class="form-control" type="email" id="adoptEmail" required></div><div class="form-group"><label class="form-label form-label--required" for="adoptAddress">ที่อยู่</label><textarea class="form-control" id="adoptAddress" required rows="2"></textarea></div><div class="form-group"><label class="form-label form-label--required" for="adoptLiving">ประเภทที่พัก</label><select class="form-control" id="adoptLiving" required><option value="house">บ้านเดี่ยว</option><option value="condo">คอนโด</option><option value="apartment">อพาร์ตเมนต์</option><option value="townhouse">ทาวน์เฮาส์</option></select></div><div class="form-group"><label class="form-label" for="adoptMsg">เหตุผลที่ต้องการรับเลี้ยง</label><textarea class="form-control" id="adoptMsg" rows="2"></textarea></div><button type="submit" id="adoptBtn" class="btn btn--primary" style="width:100%">ยื่นคำขอ</button></form></div></div></div>
